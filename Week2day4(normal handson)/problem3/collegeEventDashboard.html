<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>College Event Dashboard</title>

  <!-- Bootstrap 5 CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<!-- ✅ NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
  <div class="container">
    <a class="navbar-brand fw-bold">College Events</a>

    <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link active">Dashboard</a></li>
        <li class="nav-item"><a class="nav-link">Events</a></li>
        <li class="nav-item"><a class="nav-link">Contact</a></li>
      </ul>
    </div>
  </div>
</nav>

<!-- ✅ DASHBOARD -->
<div class="container py-4">

  <!-- Header -->
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h3 class="fw-bold">Event Dashboard</h3>

    <!-- Modal Button -->
    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#eventModal">
      + Add Event
    </button>
  </div>

  <!-- ✅ GRID LAYOUT -->
  <div class="row g-4">

    <!-- Event Card -->
    <div class="col-12 col-md-6 col-lg-4">
      <div class="card shadow-sm h-100">
        <div class="card-body">
          <h5 class="fw-bold">Tech Fest</h5>
          <p class="text-muted">Coding competitions & workshops</p>
          <span class="badge bg-success">25 March</span>
        </div>
      </div>
    </div>

    <div class="col-12 col-md-6 col-lg-4">
      <div class="card shadow-sm h-100">
        <div class="card-body">
          <h5 class="fw-bold">Cultural Fest</h5>
          <p class="text-muted">Dance, music & drama events</p>
          <span class="badge bg-warning text-dark">2 April</span>
        </div>
      </div>
    </div>

    <div class="col-12 col-md-6 col-lg-4">
      <div class="card shadow-sm h-100">
        <div class="card-body">
          <h5 class="fw-bold">Sports Meet</h5>
          <p class="text-muted">Indoor & outdoor competitions</p>
          <span class="badge bg-danger">10 April</span>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- ✅ MODAL -->
<div class="modal fade" id="eventModal">
  <div class="modal-dialog">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">Add New Event</h5>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        <form class="needs-validation" novalidate>

          <div class="mb-3">
            <label class="form-label">Event Name</label>
            <input type="text" class="form-control" required>
            <div class="invalid-feedback">Enter event name</div>
          </div>

          <div class="mb-3">
            <label class="form-label">Date</label>
            <input type="date" class="form-control" required>
            <div class="invalid-feedback">Select date</div>
          </div>

          <div class="mb-3">
            <label class="form-label">Description</label>
            <textarea class="form-control" required></textarea>
            <div class="invalid-feedback">Enter description</div>
          </div>

          <button class="btn btn-primary w-100" type="submit">Add Event</button>
        </form>
      </div>

    </div>
  </div>
</div>

<!-- ✅ Bootstrap JS Bundle (Modal working) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- ✅ Bootstrap Validation -->
<script>
(() => {
  const forms = document.querySelectorAll('.needs-validation');
  forms.forEach(form => {
    form.addEventListener('submit', e => {
      if (!form.checkValidity()) {
        e.preventDefault();
        e.stopPropagation();
      }
      form.classList.add('was-validated');
    });
  });
})();
</script>

</body>
</html>
