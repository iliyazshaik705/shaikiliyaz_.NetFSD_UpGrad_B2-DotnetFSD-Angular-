<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Electronics Products</title>

  <!-- ✅ Bootstrap CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container py-5">
  <h2 class="text-center fw-bold mb-5">Electronics Products</h2>

  <div class="row g-4">

  <!-- Smartphone -->
  <div class="col-12 col-sm-6 col-lg-3">
    <div class="card h-100 shadow-sm"
         onmouseover="this.classList.replace('shadow-sm','shadow-lg')"
         onmouseout="this.classList.replace('shadow-lg','shadow-sm')"
         style="transition:0.3s; cursor:pointer;">

      <img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?q=80&w=800"
           class="card-img-top w-100"
           style="height:220px; object-fit:cover;" alt="Smartphone">

      <div class="card-body d-flex flex-column">
        <h5>Smartphone</h5>
        <p class="text-muted">High performance mobile</p>
        <h6 class="text-primary mb-3">₹15,999</h6>

        <div class="mt-auto">
          <button class="btn btn-primary w-100 mb-2">Add to Cart</button>
          <button class="btn btn-outline-dark w-100">View Details</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Laptop -->
  <div class="col-12 col-sm-6 col-lg-3">
    <div class="card h-100 shadow-sm"
         onmouseover="this.classList.replace('shadow-sm','shadow-lg')"
         onmouseout="this.classList.replace('shadow-lg','shadow-sm')"
         style="transition:0.3s; cursor:pointer;">

      <img src="https://images.unsplash.com/photo-1496181133206-80ce9b88a853?q=80&w=800"
           class="card-img-top w-100"
           style="height:220px; object-fit:cover;" alt="Laptop">

      <div class="card-body d-flex flex-column">
        <h5>Laptop</h5>
        <p class="text-muted">Powerful & lightweight</p>
        <h6 class="text-primary mb-3">₹55,999</h6>

        <div class="mt-auto">
          <button class="btn btn-primary w-100 mb-2">Add to Cart</button>
          <button class="btn btn-outline-dark w-100">View Details</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Headphones -->
  <div class="col-12 col-sm-6 col-lg-3">
    <div class="card h-100 shadow-sm"
         onmouseover="this.classList.replace('shadow-sm','shadow-lg')"
         onmouseout="this.classList.replace('shadow-lg','shadow-sm')"
         style="transition:0.3s; cursor:pointer;">

      <img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?q=80&w=800"
           class="card-img-top w-100"
           style="height:220px; object-fit:cover;" alt="Headphones">

      <div class="card-body d-flex flex-column">
        <h5>Headphones</h5>
        <p class="text-muted">Noise cancelling audio</p>
        <h6 class="text-primary mb-3">₹2,999</h6>

        <div class="mt-auto">
          <button class="btn btn-primary w-100 mb-2">Add to Cart</button>
          <button class="btn btn-outline-dark w-100">View Details</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Smartwatch -->
  <div class="col-12 col-sm-6 col-lg-3">
    <div class="card h-100 shadow-sm"
         onmouseover="this.classList.replace('shadow-sm','shadow-lg')"
         onmouseout="this.classList.replace('shadow-lg','shadow-sm')"
         style="transition:0.3s; cursor:pointer;">

      <img src="https://images.unsplash.com/photo-1546868871-7041f2a55e12?q=80&w=800"
           class="card-img-top w-100"
           style="height:220px; object-fit:cover;" alt="Smartwatch">

      <div class="card-body d-flex flex-column">
        <h5>Smartwatch</h5>
        <p class="text-muted">Fitness tracking watch</p>
        <h6 class="text-primary mb-3">₹4,999</h6>

        <div class="mt-auto">
          <button class="btn btn-primary w-100 mb-2">Add to Cart</button>
          <button class="btn btn-outline-dark w-100">View Details</button>
        </div>
      </div>
    </div>
  </div>

</div>
</div>

</body>
</html>
