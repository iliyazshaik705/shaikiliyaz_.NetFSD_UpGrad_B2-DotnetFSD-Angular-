<!DOCTYPE html>
<html>
<head>
    <title>Location Logger</title>
</head>
<body onload="displayHistory()">

    <h2>Location-Based Weather Logger</h2>

    <button onclick="getLocation()">Get My Location</button>

    <h3>Current Location:</h3>
    <p id="currentLocation">No location fetched yet.</p>

    <h3>Location History (Last 5)</h3>
    <ul id="historyList"></ul>

<script>

function getLocation() {

    if (!navigator.geolocation) {
        alert("Geolocation is not supported by this browser.");
        return;
    }

    navigator.geolocation.getCurrentPosition(
        successCallback,
        errorCallback,
        {
            enableHighAccuracy: true,
            timeout: 10000,
            maximumAge: 0
        }
    );
}

function successCallback(position) {

    let latitude = position.coords.latitude;
    let longitude = position.coords.longitude;

    let locationData = {
        latitude: latitude,
        longitude: longitude,
        time: new Date().toLocaleString()
    };

    document.getElementById("currentLocation").innerHTML =
        "Latitude: " + latitude + "<br>Longitude: " + longitude;

    saveToLocalStorage(locationData);
    displayHistory();
}

function errorCallback(error) {

    let message = "";

    switch(error.code) {
        case error.PERMISSION_DENIED:
            message = "Permission Denied by user.";
            break;
        case error.POSITION_UNAVAILABLE:
            message = "Location information unavailable.";
            break;
        case error.TIMEOUT:
            message = "Request timed out.";
            break;
        default:
            message = "An unknown error occurred.";
    }

    document.getElementById("currentLocation").innerText = message;
}

function saveToLocalStorage(newLocation) {

    let history = JSON.parse(localStorage.getItem("locationHistory")) || [];

    history.unshift(newLocation); // Add new entry at top

    if (history.length > 5) {
        history.pop(); // Keep only last 5
    }

    localStorage.setItem("locationHistory", JSON.stringify(history));
}

function displayHistory() {

    let history = JSON.parse(localStorage.getItem("locationHistory")) || [];
    let historyList = document.getElementById("historyList");

    historyList.innerHTML = "";

    history.forEach(function(item) {
        let li = document.createElement("li");
        li.innerText =
            "Lat: " + item.latitude +
            " | Lon: " + item.longitude +
            " | Time: " + item.time;
        historyList.appendChild(li);
    });
}

</script>

</body>
</html>
