<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
    <script src="tracker.js" defer></script>
</head>
<body>

<h2>Expense Tracker</h2>

<div>
    <label>Expense ID:</label>
    <input type="number" id="id" placeholder="Enter ID">
</div>

<div>
    <label>Expense Title:</label>
    <input type="text" id="expense" placeholder="Enter Expense Title">
</div>

<br>

<div>
    <label>Amount:</label>
    <input type="number" id="amount" placeholder="Enter amount">
</div>

<br>

<div>
    <label>Date:</label>
    <input type="date" id="date">
</div>

<br>

<button id="addexpense">Add Expense</button>
<button id="updateexpense">Update Expense</button>
<button id="deleteexpense">Delete Expense</button>
<button id="viewexpense">View Expense</button>

<hr>

<ul id="list"></ul>

</body>
</html>
