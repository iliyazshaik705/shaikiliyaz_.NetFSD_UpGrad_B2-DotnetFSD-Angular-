<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Contact Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body>
    <p class=" display-5 text-center mt-5"> Responsive Contact Form</p>
    <div class="container mt-4">
        <form action=""></form>
            <div class="row">
                
                <div class="col-md-6 mb-3">
                    <label class="form-label">Full Name</label>
                    <input type="text" class="form-control" placeholder="Enter your name" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label for="" class="form-label">Email</label>
                    <input type="text" class="form-control" placeholder="Enter your email" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label for="" class="form-label">Phone</label>
                    <input type="number" class="form-control" placeholder="Enter your phone number" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label for="" class="form-label">Subject</label>
                    <input type="text" class="form-control" placeholder="Enter your sunject" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label for="" class="form-label">Message</label>
                    <input type="text" class="form-control" placeholder="Enter your message" required>
                </div>
                
            </div>

            <div class="text-center mt-4">
                <button type="submit" class="btn btn-primary me-3"> Submit</button>
                <button type="reset" class="btn btn-primary me-3"> Reset</button>
                
            </div>


            </div>

    </div>
    
</body>
</html>
