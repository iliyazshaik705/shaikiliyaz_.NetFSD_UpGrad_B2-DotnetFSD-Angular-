<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Dashboard</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container my-5">

    <h2 class="text-center mb-4">Training Institute Dashboard</h2>

    <div class="row g-4 ">

        <!-- LEFT SIDE : FORM -->
        <div class="col-md-5">

            <div class="card shadow">
                <div class="card-body">

                    <h4 class="mb-3 text-center">Registration Form</h4>

                    <form>

                        <div class="mb-3">
                            <label class="form-label">Name</label>
                            <input type="text" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Course</label>
                            <input type="text" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Contact Number</label>
                            <input type="tel" class="form-control" required>
                        </div>

                        <div class="text-center">
                            <button class="btn btn-primary me-2">Register</button>
                            <button type="reset" class="btn btn-secondary">Clear</button>
                        </div>

                    </form>

                </div>
            </div>

        </div>


        <!-- RIGHT SIDE : TABLE -->
        <div class="col-md-7">

            <div class="card shadow">
                <div class="card-body">

                    <h4 class="mb-3 text-center">Registered Students</h4>

                    <div class="table-responsive">

                        <table class="table table-striped table-bordered table-hover text-center">

                            <thead class="table-dark">
                                <tr>
                                    <th>Name</th>
                                    <th>Course</th>
                                    <th>Email</th>
                                    <th>Contact</th>
                                </tr>
                            </thead>

                            <tbody>
                                <tr><td>Rahul</td><td>Java</td><td>rahul@mail.com</td><td>9876543210</td></tr>
                                <tr><td>Anjali</td><td>Python</td><td>anjali@mail.com</td><td>9123456780</td></tr>
                                <tr><td>Kiran</td><td>Web Dev</td><td>kiran@mail.com</td><td>9988776655</td></tr>
                            </tbody>

                        </table>

                    </div>

                </div>
            </div>

        </div>

    </div>

</div>

</body>
</html>
