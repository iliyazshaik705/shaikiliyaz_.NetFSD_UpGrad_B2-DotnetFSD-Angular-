<!DOCTYPE html>
<html>
<head>
    <title>Counter App</title>
</head>
<body>

    <h2>Counter App</h2>

    <h3 id="counter">0</h3>

    <button id="incrementBtn">Increment</button>
    <button id="resetBtn">Reset</button>

    <script>
        // ✅ Global variable (outside functions)
        var counterValue = 0;

        // Function to update UI
        function updateUI() {
            document.getElementById("counter").innerText = counterValue;
        }

        // Function to increment
        function incrementCounter(step) {
            counterValue = counterValue + step;
            updateUI(); // DOM update inside function
        }

        // Function to reset
        function resetCounter() {
            counterValue = 0;
            updateUI(); // DOM update inside function
        }

        // Event listeners (no inline JS)
        document.getElementById("incrementBtn").addEventListener("click", function() {
            incrementCounter(1); // passing step as parameter
        });

        document.getElementById("resetBtn").addEventListener("click", function() {
            resetCounter();
        });

    </script>

</body>
</html>
